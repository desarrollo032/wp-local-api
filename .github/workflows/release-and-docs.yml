name: Release & Documentation

on:
  push:
    branches:
      - main
    paths:
      - '**.php'
      - '**.ts'
      - '**.tsx'
      - '**.js'
      - 'package.json'
      - 'composer.json'
      - 'wp-feature-api.php'
      - '!vendor/**'
      - '!node_modules/**'
      - '!build/**'
      - '!packages/**/build/**'

permissions:
  contents: write
  pull-requests: write

env:
  PLUGIN_MAIN_FILE: wp-feature-api.php
  PLUGIN_SLUG: wp-feature-api
  PLUGIN_NAME: "WordPress Feature API"

jobs:
  analyze:
    name: Analyze Commits & Prepare Data
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract_version.outputs.version }}
      has_changes: ${{ steps.analyze_commits.outputs.has_changes }}
      categories: ${{ steps.analyze_commits.outputs.categories }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Extract plugin version
        id: extract_version
        run: |
          VERSION=$(grep -m 1 "Version:" "${{ env.PLUGIN_MAIN_FILE }}" | sed 's/.*Version: *//' | tr -d ' \r\n')
          if [ -z "$VERSION" ]; then
            echo "Error: No se pudo extraer la versión"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check existing tag
        id: tag_check
        run: |
          if git rev-parse "v${{ steps.extract_version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Analyze and classify commits
        id: analyze_commits
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -z "$LAST_TAG" ]; then
            echo "No previous tag found. Using all commits."
            COMMITS=$(git log --oneline --format="%s||%h" -n 50)
          else
            echo "Analyzing commits since $LAST_TAG"
            COMMITS=$(git log "$LAST_TAG"..HEAD --oneline --format="%s||%h")
          fi

          ADDED_COUNT=0
          CHANGED_COUNT=0
          FIXED_COUNT=0
          BREAKING_COUNT=0

          ADDED_FILE="$GITHUB_WORKSPACE/commits_added.txt"
          CHANGED_FILE="$GITHUB_WORKSPACE/commits_changed.txt"
          FIXED_FILE="$GITHUB_WORKSPACE/commits_fixed.txt"
          BREAKING_FILE="$GITHUB_WORKSPACE/commits_breaking.txt"

          > "$ADDED_FILE"
          > "$CHANGED_FILE"
          > "$FIXED_FILE"
          > "$BREAKING_FILE"

          while IFS='||' read -r msg sha; do
            [ -z "$msg" ] && continue

            lower_msg=$(echo "$msg" | tr '[:upper:]' '[:lower:]')

            if [[ "$lower_msg" =~ ^breaking ]]; then
              echo "- $msg ([$sha](https://github.com/${{ github.repository }}/commit/$sha))" >> "$BREAKING_FILE"
              ((BREAKING_COUNT++))
            elif [[ "$lower_msg" =~ ^(fix|fixed|bugfix|correct|hotfix) ]]; then
              echo "- $msg ([$sha](https://github.com/${{ github.repository }}/commit/$sha))" >> "$FIXED_FILE"
              ((FIXED_COUNT++))
            elif [[ "$lower_msg" =~ ^(feat|feature|added|add|new) ]]; then
              echo "- $msg ([$sha](https://github.com/${{ github.repository }}/commit/$sha))" >> "$ADDED_FILE"
              ((ADDED_COUNT++))
            else
              echo "- $msg ([$sha](https://github.com/${{ github.repository }}/commit/$sha))" >> "$CHANGED_FILE"
              ((CHANGED_COUNT++))
            fi
          done <<< "$COMMITS"

          TOTAL=$((ADDED_COUNT + CHANGED_COUNT + FIXED_COUNT + BREAKING_COUNT))
          if [ "$TOTAL" -eq 0 ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

          echo "categories={\"added\":$ADDED_COUNT,\"changed\":$CHANGED_COUNT,\"fixed\":$FIXED_COUNT,\"breaking\":$BREAKING_COUNT}" >> $GITHUB_OUTPUT

          echo "Commits classified: Added=$ADDED_COUNT, Changed=$CHANGED_COUNT, Fixed=$FIXED_COUNT, Breaking=$BREAKING_COUNT"

      - name: Generate changelog content
        id: generate_changelog
        run: |
          VERSION="${{ steps.extract_version.outputs.version }}"
          DATE=$(date +'%Y-%m-%d')

          ADDED=$(cat "$GITHUB_WORKSPACE/commits_added.txt" 2>/dev/null || echo "")
          CHANGED=$(cat "$GITHUB_WORKSPACE/commits_changed.txt" 2>/dev/null || echo "")
          FIXED=$(cat "$GITHUB_WORKSPACE/commits_fixed.txt" 2>/dev/null || echo "")
          BREAKING=$(cat "$GITHUB_WORKSPACE/commits_breaking.txt" 2>/dev/null || echo "")

          CONTENT="## [$VERSION] - $DATE"$'\n\n'

          if [ -n "$BREAKING" ]; then
            CONTENT+="### ⚠️ Breaking Changes"$'\n\n'"$BREAKING"$'\n\n'
          fi

          if [ -n "$ADDED" ]; then
            CONTENT+="### ✨ Added"$'\n\n'"$ADDED"$'\n\n'
          fi

          if [ -n "$CHANGED" ]; then
            CONTENT+="### 🔄 Changed"$'\n\n'"$CHANGED"$'\n\n'
          fi

          if [ -n "$FIXED" ]; then
            CONTENT+="### 🐛 Fixed"$'\n\n'"$FIXED"$'\n\n'
          fi

          if [ -z "$BREAKING$ADDED$CHANGED$FIXED" ]; then
            CONTENT+="_No significant changes."$'\n\n'
          fi

          echo "$CONTENT" > "$GITHUB_WORKSPACE/changelog_entry.txt"

          CONTENT_ESCAPED=$(echo "$CONTENT" | head -c 6000)
          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo "$CONTENT_ESCAPED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  update_changelog:
    name: Update CHANGELOG.md
    needs: analyze
    if: needs.analyze.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            CHANGELOG.md
          sparse-checkout-cone-mode: false

      - name: Read existing CHANGELOG
        id: read_changelog
        run: |
          if [ -f "CHANGELOG.md" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            cat > CHANGELOG.md << 'EOFHEADER'
# Changelog

All notable changes to this project will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.0.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

## [Unreleased]

EOFHEADER
          fi

      - name: Create new CHANGELOG entry
        run: |
          VERSION="${{ needs.analyze.outputs.version }}"
          ENTRY=$(cat "$GITHUB_WORKSPACE/changelog_entry.txt")

          {
            echo "# Changelog"
            echo ""
            echo "All notable changes to this project will be documented in this file."
            echo ""
            echo "The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.0.0/),"
            echo "and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html)."
            echo ""
            echo "## [Unreleased]"
            echo ""
            echo "## [$VERSION] - $(date +'%Y-%m-%d')"
            echo ""
            echo "$ENTRY"
          } > CHANGELOG.md

          if [ -f CHANGELOG.md ]; then
            echo "" >> CHANGELOG.md
            tail -n +7 CHANGELOG.md >> CHANGELOG.md 2>/dev/null || true
          fi

          cat CHANGELOG.md

      - name: Commit CHANGELOG changes
        run: |
          git add CHANGELOG.md
          git status
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "docs: update CHANGELOG for ${{ needs.analyze.outputs.version }}"
            git push
          fi

  update_docs:
    name: Update Technical Documentation
    needs: analyze
    if: needs.analyze.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            docs/
          sparse-checkout-cone-mode: false

      - name: Generate documentation from commits
        id: generate_docs
        run: |
          VERSION="${{ needs.analyze.outputs.version }}"

          DOCS_DIR="docs/releases"
          mkdir -p "$DOCS_DIR"

          RELEASE_NOTES="$DOCS_DIR/$VERSION.md"

          CATEGORIES='${{ needs.analyze.outputs.categories }}'
          ADDED_COUNT=$(echo "$CATEGORIES" | grep -o '"added":[0-9]*' | grep -o '[0-9]*' || echo "0")

          cat > "$RELEASE_NOTES" << EOFNOTE
---
title: Release $VERSION
sidebar_label: v$VERSION
description: Changes and improvements in version $VERSION
---

# Release $VERSION

**Fecha:** $(date +'%Y-%m-%d')
**Versión:** $VERSION

## Resumen de Cambios

| Tipo | Cantidad |
|------|----------|
| Nuevas funcionalidades | $ADDED_COUNT |
| Cambios | - |
| Correcciones | - |

## Detalle de Cambios

$(cat "$GITHUB_WORKSPACE/changelog_entry.txt")

## Actualización

Para actualizar a esta versión, descarga el nuevo ZIP desde GitHub Releases
o actualiza vía Composer/npm.

\`\`\`bash
composer require automattic/wp-feature-api:$VERSION
npm install @automattic/wp-feature-api@$VERSION
\`\`\`

## Compatibilidad

- **WordPress mínimo:** 6.0
- **PHP mínimo:** 7.4
EOFNOTE

          echo "Documentación de release creada: $RELEASE_NOTES"

      - name: Commit documentation changes
        run: |
          git add docs/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No documentation changes to commit"
          else
            git commit -m "docs: update documentation for ${{ needs.analyze.outputs.version }}"
            git push
          fi

  release:
    name: Create Release
    needs: [analyze, update_changelog, update_docs]
    if: needs.analyze.outputs.tag_check != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          if [ -f "composer.json" ]; then composer install --no-dev --optimize-autoloader --no-interaction; fi
          if [ -f "package.json" ]; then npm ci --legacy-peer-deps; fi

      - name: Build assets
        run: |
          if [ -f "package.json" ] && grep -q '"build"' package.json; then npm run build; fi

      - name: Prepare plugin files
        run: |
          PLUGIN_SLUG="${{ env.PLUGIN_SLUG }}"
          mkdir -p "$PLUGIN_SLUG"

          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='vendor' \
            --exclude='.gitignore' \
            --exclude='.gitattributes' \
            --exclude='composer.lock' \
            --exclude='package-lock.json' \
            --exclude='tsconfig*.json' \
            --exclude='webpack.config.js' \
            --exclude='phpcs.xml*' \
            --exclude='phpunit*' \
            --exclude='.eslintrc*' \
            --exclude='.editorconfig' \
            --exclude='CONTRIBUTING.md' \
            --exclude='DESIGN.md' \
            --exclude='RFC.md' \
            --exclude='README.md' \
            --exclude='build/' \
            --exclude='packages/*/build*' \
            --exclude='packages/*/node_modules' \
            --exclude='packages/*/tsconfig*.json' \
            --exclude='packages/*/webpack.config.js' \
            . "$PLUGIN_SLUG/"

          echo "Archivos preparados"
          ls -la "$PLUGIN_SLUG/"

      - name: Create plugin ZIP
        run: |
          PLUGIN_SLUG="${{ env.PLUGIN_SLUG }}"
          VERSION="${{ needs.analyze.outputs.version }}"
          cd "$PLUGIN_SLUG"
          zip -r "../$PLUGIN_SLUG-$VERSION.zip" .
          cd ..
          echo "ZIP creado: $PLUGIN_SLUG-$VERSION.zip"

      - name: Create Git tag
        run: |
          VERSION="${{ needs.analyze.outputs.version }}"
          TAG_NAME="v$VERSION"

          CHANGELOG=$(cat "$GITHUB_WORKSPACE/changelog_entry.txt" | head -c 500)

          git tag -a "$TAG_NAME" -m "Release $VERSION" -m "$CHANGELOG"

          git push origin "$TAG_NAME"

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.analyze.outputs.version }}
          name: Release ${{ needs.analyze.outputs.version }}
          body: |
            ## 📦 ${{ env.PLUGIN_NAME }} v${{ needs.analyze.outputs.version }}

            ### Changes

            $(cat "$GITHUB_WORKSPACE/changelog_entry.txt")

            ---

            ### 📥 Installation

            **Via Composer:**
            ```
            composer require automattic/wp-feature-api:${{ needs.analyze.outputs.version }}
            ```

            **Via npm:**
            ```
            npm install @automattic/wp-feature-api@${{ needs.analyze.outputs.version }}
            ```

            ---
            [View full changelog](CHANGELOG.md)
          files: ${{ env.PLUGIN_SLUG }}-${{ needs.analyze.outputs.version }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "## ✅ Release Completado"
          echo ""
          echo "**Versión:** ${{ needs.analyze.outputs.version }}"
          echo "**Tag:** v${{ needs.analyze.outputs.version }}"
          echo "**ZIP:** ${{ env.PLUGIN_SLUG }}-${{ needs.analyze.outputs.version }}.zip"
          echo ""
          echo "📦 Release: https://github.com/${{ github.repository }}/releases/tag/v${{ needs.analyze.outputs.version }}"
          echo "📝 Changelog: https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md"
          echo "📚 Docs: https://github.com/${{ github.repository }}/tree/main/docs"

