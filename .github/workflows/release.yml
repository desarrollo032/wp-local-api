name: Release & Package

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 0.1.11)'
        required: true
        default: ''

env:
  NODE_VERSION: '20'
  DIST_DIR: dist

jobs:
  build:
    name: Build & Package
    runs-on: ubuntu-latest
    permissions:
      contents: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build --workspaces

      - name: Create package ZIPs
        run: bash scripts/package.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: ${{ env.DIST_DIR }}/
          retention-days: 30

      - name: Verify checksums
        run: |
          echo "Verifying SHA256 checksums..."
          for checksum in ${{ env.DIST_DIR }}/*.sha256; do
            if [ -f "$checksum" ]; then
              echo "Checking $(basename $checksum)..."
              sha256sum -c "$checksum"
            fi
          done

      - name: List generated files
        run: |
          echo "Generated files:"
          ls -lh ${{ env.DIST_DIR }}/

  create-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: packages
          path: ${{ env.DIST_DIR }}/

      - name: Get version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Release version: $VERSION"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.DIST_DIR }}/*
          name: Release v${{ steps.version.outputs.version }}
          body: |
            ## 🚀 WordPress Feature API v${{ steps.version.outputs.version }}

            ### ✨ Nuevas Características
            - **OpenRouter Integration:** Integración completa con OpenRouter API y modelos gratuitos
            - **Chat Interface:** Interfaz de chat moderna integrada en WordPress admin
            - **MCP Support:** Compatibilidad completa con WordPress MCP plugin v0.2.5+
            - **Build Automation:** `npm run build` ahora compila y genera ZIPs automáticamente

            ### 📦 Plugins Incluidos
            - **wp-feature-api.zip** - Plugin principal con API de funcionalidades
            - **wp-feature-api-agent.zip** - Proxy AI + Chat interface completo

            ### 🎯 Modelos Gratuitos Soportados
            - microsoft/phi-3-mini-128k-instruct:free
            - huggingfaceh4/zephyr-7b-beta:free
            - openchat/openchat-7b:free
            - Y más modelos gratuitos...

            ### 📥 Instalación
            1. Descargar los ZIPs desde esta release
            2. Instalar en WordPress: **Plugins → Añadir nuevo → Subir plugin**
            3. Activar ambos plugins
            4. Configurar OpenRouter API key en **Ajustes → WP Feature Agent Demo**

            ### 🔗 Enlaces Útiles
            - [Documentación](https://github.com/Automattic/wp-feature-api#readme)
            - [OpenRouter API Keys](https://openrouter.ai/)
            - [WordPress MCP Plugin](https://github.com/Automattic/wordpress-mcp)

            ### 🔐 Verificación
            Cada paquete incluye checksums SHA256 para verificación de integridad.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify release
        run: |
          echo "Release created successfully!"
          gh release view v${{ steps.version.outputs.version }} --json assets --jq '.assets[].name'

  verify-release:
    name: Verify Release (Optional)
    needs: create-release
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || contains(github.ref, 'main')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: packages
          path: ${{ env.DIST_DIR }}/

      - name: Verify ZIP contents
        run: |
          echo "Verifying ZIP contents..."
          for zip in ${{ env.DIST_DIR }}/*.zip; do
            if [ -f "$zip" ]; then
              echo ""
              echo "=== $(basename $zip) ==="
              unzip -l "$zip" | head -30
            fi
          done

      - name: Verify checksums
        run: |
          echo ""
          echo "=== SHA256 Checksums ==="
          for checksum in ${{ env.DIST_DIR }}/*.sha256; do
            if [ -f "$checksum" ]; then
              cat "$checksum"
            fi
          done

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

