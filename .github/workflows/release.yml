# GitHub Actions Workflow for Automated WordPress Plugin Releases
# ==============================================================
#
# Este workflow automatiza completamente el proceso de release:
# 1. Detecta tags con formato v* (ej: v0.1.10)
# 2. Instala dependencias con npm ci
# 3. Construye los assets de JavaScript
# 4. Genera los ZIPs de los plugins
# 5. Valida que cumplen las reglas de WordPress
# 6. Crea un GitHub Release automático
# 7. Adjunta los ZIPs al release
#
# Uso:
#   git tag -a v0.1.11 -m "Release v0.1.11"
#   git push origin v0.1.11
#
# El workflow se ejecutará automáticamente al hacer push del tag

name: Release Plugin

on:
  push:
    tags:
      - 'v*'  # Trigger en cualquier tag que comience con 'v'

permissions:
  contents: write
  packages: read

env:
  NODE_VERSION: '20'
  PHP_VERSION: '8.1'

jobs:
  # ========================================
  # JOB 1: Build y Generación de ZIPs
  # ========================================
  build:
    name: Build & Create ZIPs
    runs-on: ubuntu-latest
    
    steps:
      # Paso 1: Checkout del código
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Necesario para leer el CHANGELOG correctamente
      
      # Paso 2: Configurar Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'
      
      # Paso 3: Configurar PHP (para Composer)
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: dom, curl, libxml, mbstring, zip, gd
          coverage: none
      
      # Paso 4: Instalar dependencias de Composer
      - name: Install Composer dependencies
        run: composer install --no-dev --prefer-dist --no-interaction
      
      # Paso 5: Instalar dependencias de npm
      - name: Install npm dependencies
        run: npm ci
      
      # Paso 6: Construir los assets de JavaScript
      - name: Build JavaScript assets
        run: npm run build
      
      # Paso 7: Generar los ZIPs de los plugins
      - name: Create plugin ZIPs
        run: npm run build:plugins
      
      # Paso 8: Listar archivos generados
      - name: List generated files
        run: |
          echo "📦 Archivos en dist/:"
          ls -lh dist/
      
      # Paso 9: Subir los ZIPs como artifacts
      - name: Upload ZIP artifacts
        uses: actions/upload-artifact@v4
        with:
          name: plugin-zips
          path: dist/*.zip
          retention-days: 5  # Los artifacts se eliminan después de 5 días

  # ========================================
  # JOB 2: Validación de Plugins
  # ========================================
  validate:
    name: Validate WordPress Plugins
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      # Paso 1: Descargar artifacts
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: plugin-zips
          path: dist/
      
      # Paso 2: Listar ZIPs descargados
      - name: List downloaded ZIPs
        run: |
          echo "📦 ZIPs disponibles:"
          ls -lh dist/
      
      # Paso 3: Validar estructura del ZIP principal
      - name: Validate main plugin ZIP structure
        run: |
          echo "🔍 Validando wp-feature-api.zip..."
          
          # Verificar que existe
          if [ ! -f "dist/wp-feature-api.zip" ]; then
            echo "❌ Error: wp-feature-api.zip no encontrado"
            exit 1
          fi
          
          # Listar contenido
          echo "📂 Contenido del ZIP:"
          unzip -l dist/wp-feature-api.zip | head -30
          
          # Verificar carpeta raíz
          unzip -l dist/wp-feature-api.zip | grep -q "wp-feature-api/wp-feature-api.php"
          if [ $? -eq 0 ]; then
            echo "✅ Estructura correcta: carpeta wp-feature-api/"
          else
            echo "❌ Error: Estructura incorrecta"
            exit 1
          fi
      
      # Paso 4: Validar estructura del ZIP del demo agent
      - name: Validate demo agent ZIP structure
        run: |
          echo "🔍 Validando wp-feature-api-agent.zip..."
          
          if [ ! -f "dist/wp-feature-api-agent.zip" ]; then
            echo "❌ Error: wp-feature-api-agent.zip no encontrado"
            exit 1
          fi
          
          echo "📂 Contenido del ZIP:"
          unzip -l dist/wp-feature-api-agent.zip | head -30
          
          # Verificar carpeta raíz
          unzip -l dist/wp-feature-api-agent.zip | grep -q "wp-feature-api-agent/wp-feature-api-agent.php"
          if [ $? -eq 0 ]; then
            echo "✅ Estructura correcta: carpeta wp-feature-api-agent/"
          else
            echo "❌ Error: Estructura incorrecta"
            exit 1
          fi
      
      # Paso 5: Verificar que no hay archivos prohibidos
      - name: Check for forbidden files
        run: |
          echo "🔍 Verificando que no hay archivos de desarrollo..."
          
          # Verificar wp-feature-api.zip
          if unzip -l dist/wp-feature-api.zip | grep -E "(node_modules|webpack|tsconfig|\.git)"; then
            echo "❌ Error: Archivos de desarrollo encontrados en wp-feature-api.zip"
            exit 1
          else
            echo "✅ wp-feature-api.zip no contiene archivos de desarrollo"
          fi
          
          # Verificar wp-feature-api-agent.zip
          if unzip -l dist/wp-feature-api-agent.zip | grep -E "(node_modules|webpack|tsconfig|\.git)"; then
            echo "❌ Error: Archivos de desarrollo encontrados en wp-feature-api-agent.zip"
            exit 1
          else
            echo "✅ wp-feature-api-agent.zip no contiene archivos de desarrollo"
          fi

  # ========================================
  # JOB 3: Crear Release en GitHub
  # ========================================
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build, validate]
    
    steps:
      # Paso 1: Descargar artifacts
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: plugin-zips
          path: dist/
      
      # Paso 2: Extraer información del tag
      - name: Extract tag info
        id: tag
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_OUTPUT
          VERSION=${TAG_NAME#v}  # Quitar 'v' del principio
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
      
      # Paso 3: Obtener changelog para esta versión
      - name: Extract changelog
        id: changelog
        run: |
          VERSION=${{ steps.tag.outputs.VERSION }}
          
          # Extraer sección del CHANGELOG para esta versión
          # Busca desde el header de la versión hasta el siguiente header
          CHANGELOG=$(awk -v ver="$VERSION" '
            $0 ~ /^## \[/ { 
              if (found) exit
              if ($0 ~ "\\[" ver "\\]") {
                found=1
                next
              }
            }
            found {
              if ($0 ~ /^## \[/) exit
              print
            }
          ' CHANGELOG.md)
          
          # Si está vacío, usar mensaje genérico
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="## $VERSION Release\n\nSee https://github.com/${{ github.repository }}/releases/tag/${{ steps.tag.outputs.TAG_NAME }} for details."
          fi
          
          # Guardar en variable de salida (escapando correctamente)
          CHANGELOG="${CHANGELOG//'%'/'%25'}"
          CHANGELOG="${CHANGELOG//$'\n'/'%0A'}"
          CHANGELOG="${CHANGELOG//$'\r'/'%0D'}"
          echo "content=$CHANGELOG" >> $GITHUB_OUTPUT
      
      # Paso 4: Crear el release con softprops/action-gh-release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.TAG_NAME }}
          name: Release ${{ steps.tag.outputs.TAG_NAME }}
          body: ${{ steps.changelog.outputs.content }}
          draft: false
          prerelease: false
          files: |
            dist/wp-feature-api.zip
            dist/wp-feature-api-agent.zip
          generate_release_notes: false
      
      # Paso 5: Verificar release creado
      - name: Verify release
        run: |
          echo "✅ Release creado exitosamente!"
          echo "📦 URL: https://github.com/${{ github.repository }}/releases/tag/${{ steps.tag.outputs.TAG_NAME }}"
          echo ""
          echo "Archivos adjuntos:"
          ls -lh dist/*.zip

  # ========================================
  # JOB 4: Notificación (opcional)
  # ========================================
  notify:
    name: Notify Release Complete
    runs-on: ubuntu-latest
    needs: release
    if: always() && needs.release.result == 'success'
    
    steps:
      - name: Print success message
        run: |
          echo ""
          echo "========================================"
          echo "🎉 RELEASE COMPLETADO EXITOSAMENTE! 🎉"
          echo "========================================"
          echo ""
          echo "📦 Versión: ${{ github.ref_name }}"
          echo "🔗 URL del Release: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}"
          echo ""
          echo "📥 Archivos descargables:"
          echo "   - wp-feature-api.zip"
          echo "   - wp-feature-api-agent.zip"
          echo ""
          echo "Los archivos ZIP han sido validados y están listos para instalar en WordPress."
          echo "========================================"

