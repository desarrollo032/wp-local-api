name: Release Plugin

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: read

jobs:
  release:
    name: Create Release ${{ github.ref_name }}
    runs-on: ubuntu-22.04

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Setup Node.js 18
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      # 3. Setup PHP 8.2 with Composer
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer

      # 4. Install dependencies
      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps
          composer install --no-dev --prefer-dist --no-interaction

      # 5. Build plugin
      - name: Build plugin
        run: npm run build

      # 6. Prepare and create ZIP packages
      - name: Create ZIP packages
        run: |
          mkdir -p release/wp-feature-api
          mkdir -p release/wp-feature-api-agent

          # Plugin principal (wp-feature-api.zip)
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='tests' \
            --exclude='src' \
            --exclude='vendor' \
            --exclude='.gitignore' \
            --exclude='.gitattributes' \
            --exclude='composer.lock' \
            --exclude='package-lock.json' \
            --exclude='tsconfig*.json' \
            --exclude='webpack.config.js' \
            --exclude='phpcs.xml*' \
            --exclude='phpunit*' \
            --exclude='*.map' \
            --exclude='.eslintrc*' \
            --exclude='.editorconfig' \
            --exclude='CONTRIBUTING.md' \
            --exclude='DESIGN.md' \
            --exclude='RFC.md' \
            --exclude='README.md' \
            --exclude='build/' \
            --exclude='packages/*/build*' \
            --exclude='packages/*/node_modules' \
            --exclude='packages/*/tsconfig*.json' \
            --exclude='packages/*/webpack.config.js' \
            . release/wp-feature-api/

          # Agent package (wp-feature-api-agent.zip)
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='tests' \
            --exclude='src' \
            --exclude='build' \
            --exclude='*.map' \
            --exclude='.gitignore' \
            demo/wp-feature-api-agent/ release/wp-feature-api-agent/

          # Create ZIP files
          cd release
          zip -r wp-feature-api.zip wp-feature-api
          zip -r wp-feature-api-agent.zip wp-feature-api-agent

      # 7. Calculate SHA256
      - name: Calculate SHA256
        run: |
          cd release
          sha256sum wp-feature-api.zip > wp-feature-api.zip.sha256
          sha256sum wp-feature-api-agent.zip > wp-feature-api-agent.zip.sha256

      # 8. Generate changelog
      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=v0.1.7
          CURRENT_TAG=${{ github.ref_name }}
          
          # Generate changelog with format: "* %s by @%an in #%h"
          CHANGELOG=$(git log $PREV_TAG..$CURRENT_TAG --pretty=format:'* %s by @%an in #%h' --reverse)
          
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="* No changes from previous version"
          fi
          
          # Create CHANGELOG.md
          echo "# Changelog" > CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "## $CURRENT_TAG" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "$CHANGELOG" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "---" >> CHANGELOG.md
          echo "*Full changelog:* https://github.com/${{ github.repository }}/compare/$PREV_TAG...$CURRENT_TAG" >> CHANGELOG.md
          
          # Save to GITHUB_OUTPUT
          echo "changelog=$(cat CHANGELOG.md)" >> $GITHUB_OUTPUT

      # 9. Publish GitHub Release
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            ## Changelog

            ${{ steps.changelog.outputs.changelog }}

            ---

            **Full changelog:** https://github.com/${{ github.repository }}/compare/v0.1.7...${{ github.ref_name }}
          files: |
            release/wp-feature-api.zip
            release/wp-feature-api-agent.zip
            release/wp-feature-api.zip.sha256
            release/wp-feature-api-agent.zip.sha256
            release/CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Summary
      - name: Summary
        run: |
          echo "## ✅ Release ${{ github.ref_name }} published successfully"
          echo ""
          echo "**Assets generated:**"
          ls -lh release/
          echo ""
          echo "**Release URL:** https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}"

