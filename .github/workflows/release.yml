name: Release Plugin

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: read

jobs:
  release:
    name: Create Release v${{ github.ref_name }}
    runs-on: ubuntu-22.04

    steps:
      # Checkout code
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Setup Node.js
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Setup PHP
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer

      # Get version from tag
      - name: Extract version
        id: version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # Install dependencies
      - name: Install dependencies
        run: |
          npm install --legacy-peer-deps
          composer install --no-dev --prefer-dist --no-interaction

      # Build plugin
      - name: Build plugin
        run: npm run build

      # Prepare plugin packages
      - name: Prepare plugin packages
        run: |
          mkdir -p release/wp-feature-api
          mkdir -p release/wp-feature-api-agent

          # Copiar plugin principal (excluyendo archivos de desarrollo)
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='vendor' \
            --exclude='.gitignore' \
            --exclude='.gitattributes' \
            --exclude='composer.lock' \
            --exclude='package-lock.json' \
            --exclude='tsconfig*.json' \
            --exclude='webpack.config.js' \
            --exclude='phpcs.xml*' \
            --exclude='phpunit*' \
            --exclude='*.map' \
            --exclude='.eslintrc*' \
            --exclude='.editorconfig' \
            --exclude='CONTRIBUTING.md' \
            --exclude='DESIGN.md' \
            --exclude='RFC.md' \
            --exclude='README.md' \
            --exclude='build/' \
            --exclude='packages/*/build*' \
            --exclude='packages/*/node_modules' \
            --exclude='packages/*/tsconfig*.json' \
            --exclude='packages/*/webpack.config.js' \
            . release/wp-feature-api/

          # Copiar demo agent plugin
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='build/' \
            --exclude='*.map' \
            --exclude='.gitignore' \
            demo/wp-feature-api-agent/ release/wp-feature-api-agent/

      # Create ZIP files
      - name: Create ZIP files
        run: |
          cd release
          zip -r wp-feature-api.zip wp-feature-api
          zip -r wp-feature-api-agent.zip wp-feature-api-agent
          sha256sum wp-feature-api.zip > wp-feature-api.zip.sha256
          sha256sum wp-feature-api-agent.zip > wp-feature-api-agent.zip.sha256

      # Generate changelog
      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=v0.1.7
          CURRENT_TAG=v${{ steps.version.outputs.version }}
          
          # Generate changelog with contributors
          CHANGELOG=$(git log $PREV_TAG..$CURRENT_TAG --pretty=format:'* %s by @%an' --reverse)
          
          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="* No changes from previous version"
          fi
          
          # Add header
          echo "# Changelog" > CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "## $CURRENT_TAG" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "$CHANGELOG" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "---" >> CHANGELOG.md
          echo "*Full changelog:* https://github.com/${{ github.repository }}/compare/$PREV_TAG...$CURRENT_TAG" >> CHANGELOG.md
          
          echo "changelog=$(cat CHANGELOG.md)" >> $GITHUB_OUTPUT

      # Publish GitHub Release
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release v${{ steps.version.outputs.version }}
          body: |
            ## 📦 Release v${{ steps.version.outputs.version }}

            ### Changelog

            ${{ steps.changelog.outputs.changelog }}

            ---
            
            ### 📥 Assets

            | File | SHA256 |
            |------|--------|
            | wp-feature-api.zip | $(cat release/wp-feature-api.zip.sha256) |
            | wp-feature-api-agent.zip | $(cat release/wp-feature-api-agent.zip.sha256) |

            ### 👥 Contributors

            <!-- CONTRIBUTORS_START -->
            ${{ github.actor }}
            <!-- CONTRIBUTORS_END -->
          files: |
            release/wp-feature-api.zip
            release/wp-feature-api-agent.zip
            release/wp-feature-api.zip.sha256
            release/wp-feature-api-agent.zip.sha256
            release/CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "## ✅ Release v${{ steps.version.outputs.version }} publicado exitosamente"
          echo ""
          echo "**Assets generados:**"
          ls -lh release/
          echo ""
          echo "**Próximos pasos:**"
          echo "1. Ve a https://github.com/${{ github.repository }}/releases/tag/v${{ steps.version.outputs.version }}"
          echo "2. Edita el release para añadir más detalles si es necesario"
          echo "3. Comparte el release con la comunidad"

