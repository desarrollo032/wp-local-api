name: Release & Package

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 0.1.11)'
        required: true
        default: ''

env:
  NODE_VERSION: '20'
  DIST_DIR: dist

jobs:
  build:
    name: Build & Package
    runs-on: ubuntu-latest
    permissions:
      contents: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build

      - name: Create package ZIPs
        run: node scripts/create-packages-zip.js

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: ${{ env.DIST_DIR }}/
          retention-days: 30

      - name: Verify checksums
        run: |
          echo "Verifying SHA256 checksums..."
          for checksum in ${{ env.DIST_DIR }}/*.sha256; do
            echo "Checking $(basename $checksum)..."
            sha256sum -c "$checksum"
          done

      - name: List generated files
        run: |
          echo "Generated files:"
          ls -lh ${{ env.DIST_DIR }}/

  create-release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: packages
          path: ${{ env.DIST_DIR }}/

      - name: Get version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Release version: $VERSION"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.DIST_DIR }}/*
          name: Release ${{ steps.version.outputs.version }}
          body: |
            ## What's New

            Automated release generated from GitHub Actions.

            ### Packages

            - wp-feature-api.zip - Core API client
            - wp-feature-api-agent.zip - Client features plugin
            - wp-feature-api-demo.zip - Demo agent plugin

            ### Verification

            Each package includes SHA256 checksums for integrity verification.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify release
        run: |
          echo "Release created successfully!"
          gh release view ${{ steps.version.outputs.version }} --json assets --jq '.assets[].name'

  verify-release:
    name: Verify Release (Optional)
    needs: create-release
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || contains(github.ref, 'main')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: packages
          path: ${{ env.DIST_DIR }}/

      - name: Verify ZIP contents
        run: |
          echo "Verifying ZIP contents..."
          for zip in ${{ env.DIST_DIR }}/*.zip; do
            echo ""
            echo "=== $(basename $zip) ==="
            unzip -l "$zip" | head -30
          done

      - name: Verify checksums
        run: |
          echo ""
          echo "=== SHA256 Checksums ==="
          cat ${{ env.DIST_DIR }}/*.sha256

  nightly-build:
    name: Nightly Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && !github.event.inputs.version)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build

      - name: Create package ZIPs
        run: node scripts/create-packages-zip.js

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nightly
          path: ${{ env.DIST_DIR }}/
          retention-days: 7

      - name: Upload to nightly release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.DIST_DIR }}/*
          name: Nightly Build $(date +%Y-%m-%d)
          body: |
            ## Nightly Build

            Automated nightly build from ${{ github.sha }}

            **Branch:** ${{ github.ref_name }}
            **Commit:** ${{ github.sha }}

            > ⚠️ This release is for testing purposes only.
          draft: true
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

