name: Release WordPress Plugin

# =============================================================================
# TRIGGER: Se ejecuta automáticamente en push/merge a la rama main
# =============================================================================
on:
  push:
    branches:
      - main
    # Solo ejecutar si hay cambios en archivos relevantes del plugin
    paths:
      - 'wp-feature-api.php'
      - 'includes/**/*.php'
      - '!vendor/**'
      - '!node_modules/**'

permissions:
  contents: write
  packages: read

env:
  PLUGIN_MAIN_FILE: wp-feature-api.php
  PLUGIN_SLUG: wp-feature-api

jobs:
  # ===========================================================================
  # JOB: Release - Compila, crea ZIP y publica en GitHub Releases
  # ===========================================================================
  release:
    name: Create Release
    runs-on: ubuntu-latest

    steps:
      # =======================================================================
      # STEP 1: Checkout del repositorio
      # =======================================================================
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Necesario para generar changelog desde tags

      # =======================================================================
      # STEP 2: Configurar Git (necesario para crear tags localmente)
      # =======================================================================
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # =======================================================================
      # STEP 3: Extraer versión del archivo principal del plugin
      # =======================================================================
      - name: Extract plugin version
        id: version
        run: |
          # Extraer la versión desde la cabecera del plugin PHP
          VERSION=$(grep -m 1 "Version:" "${{ env.PLUGIN_MAIN_FILE }}" | sed 's/.*Version: *//' | tr -d ' \r\n')
          
          # Validar que la versión no esté vacía
          if [ -z "$VERSION" ]; then
            echo "Error: No se pudo extraer la versión de ${{ env.PLUGIN_MAIN_FILE }}"
            exit 1
          fi
          
          echo "Versión extraída: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # =======================================================================
      # STEP 4: Verificar si el tag ya existe (evitar duplicados)
      # =======================================================================
      - name: Check if tag exists
        id: tag_check
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "Tag v${{ steps.version.outputs.version }} ya existe. Cancelando release."
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      # =======================================================================
      # STEP 5: Instalar dependencias (si el plugin las necesita)
      # =======================================================================
      - name: Install dependencies
        if: runner.os == 'Linux' && file composer.json 2>/dev/null | grep -q JSON
        run: |
          if [ -f "composer.json" ]; then
            composer install --no-dev --optimize-autoloader --no-interaction
          fi
        shell: bash

      - name: Install npm dependencies
        if: runner.os == 'Linux' && file package.json 2>/dev/null | grep -q JSON
        run: |
          if [ -f "package.json" ]; then
            npm ci --legacy-peer-deps
          fi
        shell: bash

      # =======================================================================
      # STEP 6: Construir assets (si hay build script)
      # =======================================================================
      - name: Build assets
        if: runner.os == 'Linux' && [ -f "package.json" ] && grep -q '"build"' package.json
        run: npm run build
        shell: bash

      # =======================================================================
      # STEP 7: Generar changelog desde el último tag
      # =======================================================================
      - name: Generate changelog
        id: changelog
        run: |
          # Obtener el tag anterior (último tag semver antes del actual)
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          
          if [ -z "$LAST_TAG" ]; then
            # Si no hay tags anteriores, usar primer commit
            CHANGELOG=$(git log --oneline --format="* %s" -n 20)
            echo "_no_previous_tag=true" >> $GITHUB_OUTPUT
          else
            # Generar changelog desde el último tag
            CHANGELOG=$(git log "$LAST_TAG"..HEAD --oneline --format="* %s")
            
            # Si no hay cambios desde el último tag
            if [ -z "$CHANGELOG" ]; then
              echo "No hay cambios desde $LAST_TAG"
              CHANGELOG="* Sin cambios significativos"
            fi
            echo "_last_tag=$LAST_TAG" >> $GITHUB_OUTPUT
          fi
          
          echo "changelog=$CHANGELOG" >> $GITHUB_OUTPUT

      # =======================================================================
      # STEP 8: Crear directorio temporal y preparar archivos
      # =======================================================================
      - name: Prepare plugin files
        run: |
          PLUGIN_SLUG="${{ env.PLUGIN_SLUG }}"
          mkdir -p "$PLUGIN_SLUG"
          
          # Copiar archivos del plugin al directorio temporal
          # Excluir: .git, .github, node_modules, vendor, archivos de desarrollo
          rsync -av \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='vendor' \
            --exclude='.gitignore' \
            --exclude='.gitattributes' \
            --exclude='composer.lock' \
            --exclude='package-lock.json' \
            --exclude='tsconfig*.json' \
            --exclude='webpack.config.js' \
            --exclude='phpcs.xml*' \
            --exclude='phpunit*' \
            --exclude='*.map' \
            --exclude='.eslintrc*' \
            --exclude='.editorconfig' \
            --exclude='CONTRIBUTING.md' \
            --exclude='DESIGN.md' \
            --exclude='RFC.md' \
            --exclude='README.md' \
            --exclude='build/' \
            --exclude='packages/*/build*' \
            --exclude='packages/*/node_modules' \
            --exclude='packages/*/tsconfig*.json' \
            --exclude='packages/*/webpack.config.js' \
            . "$PLUGIN_SLUG/"
          
          echo "Archivos preparados en $PLUGIN_SLUG/"
          ls -la "$PLUGIN_SLUG/"

      # =======================================================================
      # STEP 9: Crear archivo ZIP del plugin
      # =======================================================================
      - name: Create plugin ZIP
        run: |
          PLUGIN_SLUG="${{ env.PLUGIN_SLUG }}"
          VERSION="${{ steps.version.outputs.version }}"
          
          # Crear ZIP sin directorio padre (flat)
          cd "$PLUGIN_SLUG"
          zip -r "../$PLUGIN_SLUG-$VERSION.zip" .
          
          cd ..
          echo "ZIP creado: $PLUGIN_SLUG-$VERSION.zip"
          ls -lh "$PLUGIN_SLUG-$VERSION.zip"

      # =======================================================================
      # STEP 10: Cancelar si el tag ya existe
      # =======================================================================
      - name: Cancel if tag exists
        if: steps.tag_check.outputs.exists == 'true'
        run: |
          echo "El release ha sido cancelado porque el tag ya existe."
          exit 78  # Código de salida especial para cancelar workflow

      # =======================================================================
      # STEP 11: Crear y pushear el tag Git
      # =======================================================================
      - name: Create Git tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG_NAME="v$VERSION"
          
          # Crear tag anotado con metadatos
          CHANGELOG=$(git log --oneline --format="* %s" -n 10)
          
          git tag -a "$TAG_NAME" -m "Release $VERSION" -m "" -m "Changes:" -m "$CHANGELOG"
          
          # Verificar tag creado
          echo "Tag creado: $TAG_NAME"
          git tag -l | grep "$VERSION"
          
          # Pushear tag a remoto (usando token de GitHub)
          git push origin "$TAG_NAME" || echo "El tag ya existe en remoto"

      # =======================================================================
      # STEP 12: Crear GitHub Release
      # =======================================================================
      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.version.outputs.version }}
          release_name: Release ${{ steps.version.outputs.version }}
          body: |
            ## Changes from previous version
            
            ${{ steps.changelog.outputs.changelog }}
            
            ---
            
            **Full Chelog:** [Compare versions](https://github.com/${{ github.repository }}/compare/v${{ steps.chelog.outputs._last_tag || '0.0.0' }}...v${{ steps.version.outputs.version }})
            
            **Assets:**
            - `${{ env.PLUGIN_SLUG }}-${{ steps.version.outputs.version }}.zip` - Plugin ready for installation
          draft: false
          prerelease: false

      # =======================================================================
      # STEP 13: Subir el ZIP como asset del release
      # =======================================================================
      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ env.PLUGIN_SLUG }}-${{ steps.version.outputs.version }}.zip
          asset_name: ${{ env.PLUGIN_SLUG }}-${{ steps.version.outputs.version }}.zip
          asset_content_type: application/zip

      # =======================================================================
      # STEP 14: Mostrar resumen final
      # =======================================================================
      - name: Summary
        run: |
          echo "## ✅ Release completado exitosamente"
          echo ""
          echo "**Versión:** ${{ steps.version.outputs.version }}"
          echo "**Tag:** v${{ steps.version.outputs.version }}"
          echo "**ZIP:** ${{ env.PLUGIN_SLUG }}-${{ steps.version.outputs.version }}.zip"
          echo ""
          echo "El release está disponible en: https://github.com/${{ github.repository }}/releases/tag/v${{ steps.version.outputs.version }}"

